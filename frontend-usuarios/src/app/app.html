<style>
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background-color: #e9ecef;
    color: #212529;
    margin: 0;
  }

  .contenedor {
    max-width: 960px;
    margin: 40px auto;
    padding: 20px;
  }

  h1 {
    text-align: center;
    margin-bottom: 35px;
    font-weight: 700;
    color: #0d6efd;
  }

  /* ===== CARDS ===== */
  .card {
    background: #ffffff;
    border-radius: 10px;
    border: 1px solid #dee2e6;
    box-shadow: 0 6px 15px rgba(0, 0, 0, 0.08);
    padding: 25px;
    margin-bottom: 30px;
  }

  .card-title {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 20px;
    color: #495057;
  }

  /* ===== FORM ===== */
  label {
    font-weight: 600;
    margin-bottom: 6px;
    display: block;
  }

  input {
    width: 100%;
    padding: 10px 12px;
    border-radius: 6px;
    border: 1px solid #ced4da;
    font-size: 14px;
    margin-bottom: 15px;
  }

  input:focus {
    border-color: #0d6efd;
    outline: none;
    box-shadow: 0 0 0 0.2rem rgba(13, 110, 253, .25);
  }

  /* ===== BUTTON ===== */
  button {
    width: 100%;
    background-color: #0d6efd;
    color: #fff;
    border: none;
    padding: 12px;
    border-radius: 6px;
    font-weight: 600;
    font-size: 15px;
    cursor: pointer;
    transition: background-color 0.2s ease, box-shadow 0.2s ease;
  }

  button:hover {
    background-color: #0b5ed7;
    box-shadow: 0 6px 12px rgba(13, 110, 253, .35);
  }

  button:disabled {
    background-color: #adb5bd;
    cursor: not-allowed;
    box-shadow: none;
  }

  /* ===== TABLE ===== */
  table {
    width: 100%;
    border-collapse: collapse;
    border-radius: 10px;
    overflow: hidden;
  }

  thead {
    background-color: #0d6efd;
    color: white;
  }

  th, td {
    padding: 12px 15px;
    font-size: 14px;
  }

  tbody tr:nth-child(even) {
    background-color: #f8f9fa;
  }

  tbody tr:hover {
    background-color: #e7f1ff;
  }

  hr {
    margin: 40px 0;
    border: none;
    height: 1px;
    background-color: #dee2e6;
  }
</style>

<div class="contenedor">
  <h1>Gestión de Usuarios</h1>

  <div class="card">
    <div class="card-title">➕ Agregar usuario</div>
    <app-agregar-usuario></app-agregar-usuario>
  </div>

  <div class="card">
    <div class="card-title">📋 Lista de usuarios</div>
    <app-listar-usuarios></app-listar-usuarios>
  </div>
</div>
