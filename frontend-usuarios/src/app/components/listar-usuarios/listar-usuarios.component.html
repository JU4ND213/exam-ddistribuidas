<h2>Lista de Usuarios</h2>
<button (click)="cargarUsuarios()">Refrescar Lista</button>

<table border="1" style="margin-top: 15px; width: 100%;">
  <thead>
  <tr>
    <th>ID</th>
    <th>Nombre</th>
    <th>Email</th>
  </tr>
  </thead>
  <tbody>
  <tr *ngFor="let user of usuarios">
    <td>{{ user.id }}</td>
    <td>{{ user.nombre }}</td>
    <td>{{ user.email }}</td>
  </tr>
  </tbody>
</table>
<p *ngIf="usuarios.length === 0">No hay usuarios registrados.</p>
